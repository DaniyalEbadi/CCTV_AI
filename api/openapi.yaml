    get:
      summary: RTSPtoWebRTC server implementation
      description: Simple API for support [RTSPtoWebRTC](https://www.home-assistant.io/integrations/rtsp_to_webrtc/) integration
      tags: [ RTSPtoWebRTC ]
      responses:
            default:
              description: Default response

  # ============================================
  # WEBTORRENT PEER-TO-PEER STREAMING
  # ============================================
  # WebTorrent enables decentralized video sharing
  # Benefits:
  # - Reduces bandwidth (peers share video with each other)
  # - No central CDN needed
  # - Works over WebSocket (browser-compatible)
  # Shares are password-protected and time-limited
  # Each share gets a unique ID and password
  
/api/webtorrent?src={src}:
    # GET /api/webtorrent?src=camera1
    # Get share info for a specific stream
    # Returns: share ID and password for peer access
    # Magnet link format: webtorrent:?share=ABC123&pwd=xyz789
    get:
      summary: Get WebTorrent share info
      tags: [ WebTorrent ]
      parameters:
        - $ref: "#/components/parameters/stream_src_path"
      responses:
        200: { $ref: "#/components/responses/webtorrent" }
    
    # POST /api/webtorrent?src=camera1
    # Create new peer-to-peer share for a stream
    # Server generates random share ID and password
    # Returns credentials for peers to join
    # Use case: Share stream via magnet link
    post:
      summary: Add WebTorrent share
      tags: [ WebTorrent ]
      parameters:
        - $ref: "#/components/parameters/stream_src_path"
      responses:
        200: { $ref: "#/components/responses/webtorrent" }

    # DELETE /api/webtorrent?src=camera1
    # Stop sharing a stream via WebTorrent
    # Removes share from tracker, existing peers can finish downloading
    # Use case: Remove temporary stream access
    delete:
      summary: Delete WebTorrent share
      tags: [ WebTorrent ]
      parameters:
        - $ref: "#/components/parameters/stream_src_path"
      responses:
            default:
              description: Default response

/api/webtorrent:
    # GET /api/webtorrent
    # List all active WebTorrent shares
    # Shows which streams are being shared peer-to-peer
    # Returns share IDs and passwords for all active shares
    # Use case: Monitor active P2P streams
    get:
      summary: Get all WebTorrent shares info
      tags: [ WebTorrent ]
      responses:
        200: { $ref: "#/components/responses/discovery" }

