# ============================================
# ONVIF SERVER IMPLEMENTATION
# ============================================
# ONVIF (Open Network Video Interface Forum) is a standard protocol used by IP cameras
# for discovery, configuration, media streaming, and device management.
#
# IMPORTANT:
# - go2rtc does NOT implement the full ONVIF spec.
# - This endpoint provides a *minimal / lightweight ONVIF server*.
# - Its primary goal is COMPATIBILITY, not full ONVIF compliance.
#
# Typical use cases:
# - Allow ONVIF clients (NVRs, VMS software, Home Assistant, camera tools)
#   to "detect" go2rtc as an ONVIF-capable device.
# - Allow cameras or tools that REQUIRE ONVIF endpoints to interact with streams.
#
# Key concept:
# - This endpoint accepts ANY sub-path after /onvif/
# - go2rtc internally routes and responds to ONVIF SOAP/XML requests.
# - The OpenAPI spec cannot enumerate all sub-URLs, so it is defined as a catch-all.

/onvif/:
    get:
      summary: ONVIF server implementation

      description: |
        Simple realisation of the ONVIF protocol.
        Accepts any suburl requests.

        Explanation:
        - This endpoint acts as a generic ONVIF handler.
        - Clients may request paths like:
            /onvif/device_service
            /onvif/media_service
            /onvif/events_service
        - go2rtc parses the incoming SOAP/XML payload and responds accordingly.

      tags: [ ONVIF ]

      responses:
        default:
          description: Default response
          # Response details depend entirely on the ONVIF action requested.
          #
          # Common behaviors:
          # - Returns SOAP XML responses (NOT JSON).
          # - Content-Type is typically application/soap+xml or text/xml.
          #
          # Practical notes:
          # - Swagger/OpenAPI cannot fully model SOAP-based APIs.
          # - This endpoint exists mostly for interoperability, not REST usage.
          #
          # Typical clients:
          # - ONVIF Device Manager
          # - Surveillance/NVR software
          # - Home Assistant ONVIF integration
          #
          # Security considerations:
          # - ONVIF often includes authentication (Digest / WS-Security).
          # - Exposing this endpoint publicly can leak camera topology.
          #
          # Debugging tip:
          # - Use tcpdump or Wireshark to inspect ONVIF SOAP traffic.
          # - ONVIF problems are usually XML/schema related, not HTTP errors.

# ============================================
# RTSP → WEBRTC BRIDGE ENDPOINT
# ============================================
# This endpoint exists specifically to support integrations that expect
# a very simple HTTP API for converting RTSP streams into WebRTC streams.
#
# It is MOST COMMONLY used by:
# - Home Assistant's "RTSP to WebRTC" integration
#   https://www.home-assistant.io/integrations/rtsp_to_webrtc/
#
# Design philosophy:
# - Extremely simple
# - Minimal REST surface
# - Hide complex WebRTC signaling logic behind a single endpoint

/stream/:
    get:
      summary: RTSPtoWebRTC server implementation

      description: |
        Simple API for support RTSPtoWebRTC integration.

        Explanation:
        - This endpoint provides a WebRTC-compatible stream
          derived from an RTSP source.
        - It handles:
            - SDP negotiation
            - ICE candidates
            - Media pipeline setup
        - Clients do NOT need to understand WebRTC internals.

      tags: [ RTSPtoWebRTC ]

      responses:
        default:
          description: Default response
          # Response type:
          # - Usually NOT JSON.
          # - Often returns SDP or WebRTC signaling data.
          #
          # Practical behavior:
          # - Browser or Home Assistant calls this endpoint.
          # - go2rtc internally:
          #     1) Connects to RTSP source
          #     2) Decodes packets if needed
          #     3) Repackages stream for WebRTC
          #     4) Sends back WebRTC-compatible response
          #
          # Why this endpoint exists separately:
          # - WebRTC signaling does not map cleanly to REST APIs.
          # - This endpoint acts as a compatibility shim.
          #
          # Common pitfalls:
          # - Requires UDP ports for ICE
          # - NAT/firewall issues are the #1 cause of failure
          # - Browser codec support must match stream codecs
          #
          # Debug tip:
          # - Check browser console WebRTC logs
          # - Verify STUN/TURN configuration if remote access fails

# ============================================
# WEBTORRENT – STREAM SHARING (PER-STREAM)
# ============================================
# WebTorrent allows peer-to-peer distribution of live or recorded streams.
#
# Conceptually:
# - go2rtc becomes a WebTorrent seeder.
# - Clients download stream data via WebRTC data channels.
# - This reduces server bandwidth usage when many viewers exist.
#
# Key idea:
# - Each stream can be "shared" as a torrent.
# - This endpoint manages sharing for a SINGLE stream.

/api/webtorrent?src={src}:
    # ----------------------------
    # GET: Retrieve WebTorrent share info
    # ----------------------------
    # What it does:
    # - Returns the torrent/share information for a given stream.
    # - Does NOT create the share if it doesn't exist.
    #
    # Typical usage:
    # - Client wants to join an existing WebTorrent swarm.
    # - UI wants to display magnet/share info.
    get:
      summary: Get WebTorrent share info
      tags: [ WebTorrent ]
      parameters:
        - $ref: "#/components/parameters/stream_src_path"
      responses:
        200:
          $ref: "#/components/responses/webtorrent"
          # Example response:
          # {
          #   "share": "AKDypPy4zz",
          #   "pwd": "H0Km1HLTTP"
          # }
          #
          # Meaning:
          # - share: Unique identifier for torrent swarm
          # - pwd: Optional password for access control

    # ----------------------------
    # POST: Add WebTorrent share
    # ----------------------------
    # What it does:
    # - Creates a WebTorrent share for the specified stream.
    # - Starts seeding the stream data.
    #
    # Side effects:
    # - go2rtc allocates WebTorrent resources.
    # - Clients can now connect peer-to-peer.
    #
    # Use case:
    # - Start sharing a stream to many users without overloading server bandwidth.
    post:
      summary: Add WebTorrent share
      tags: [ WebTorrent ]
      parameters:
        - $ref: "#/components/parameters/stream_src_path"
      responses:
        200:
          $ref: "#/components/responses/webtorrent"
          # Behavior notes:
          # - If share already exists, server may return existing info.
          # - Password may be auto-generated.
          #
          # Performance notes:
          # - Initial seeding still requires server bandwidth.
          # - Bandwidth savings increase as more peers join.

    # ----------------------------
    # DELETE: Remove WebTorrent share
    # ----------------------------
    # What it does:
    # - Stops sharing the specified stream via WebTorrent.
    # - Disconnects swarm participation.
    #
    # Side effects:
    # - Existing peers may lose connection or need fallback.
    delete:
      summary: Delete WebTorrent share
      tags: [ WebTorrent ]
      parameters:
        - $ref: "#/components/parameters/stream_src_path"
      responses:
        default:
          description: Default response
          #
          # Notes:
          # - This does NOT delete the stream itself.
          # - Only disables WebTorrent sharing.
          #
          # Use case:
          # - Reduce resource usage
          # - Disable P2P distribution for sensitive streams

# ============================================
# WEBTORRENT – GLOBAL INFORMATION
# ============================================
# This endpoint provides discovery-style information for ALL WebTorrent shares.

/api/webtorrent:
    get:
      summary: Get all WebTorrent shares info
      tags: [ WebTorrent ]
      responses:
        200:
          $ref: "#/components/responses/discovery"
          #
          # Example:
          # {
          #   "streams": [
          #     { "name": "camera1", "url": "magnet:?xt=..." }
          #   ]
          # }
          #
          # Use cases:
          # - Admin UI listing all shared streams
          # - Monitoring active P2P distributions
          #
          # Operational note:
          # - Useful to audit which streams are exposed via WebTorrent.

# ============================================
# DEBUGGING – GOROUTINE STACK INSPECTION
# ============================================
# This endpoint is intended STRICTLY for debugging and development.
#
# It exposes internal Go runtime information:
# - Goroutines are lightweight threads managed by Go.
# - "Unknown goroutines" typically mean:
#     - Leaked goroutines
#     - Deadlocks
#     - Stuck network operations
#
# WARNING:
# - This endpoint should NEVER be exposed publicly.
# - Stack traces can reveal internal logic and memory addresses.

/api/stack:
    get:
      summary: Show list unknown goroutines
      tags: [ Debug ]
      responses:
        200:
          description: ""
          content: { text/plain: { example: "" } }
              #
              # Response content:
              # - Plain-text stack traces
              # - Similar to Go's runtime.Stack output
              #
              # Typical usage:
              # - Developer notices increasing memory usage
              # - Calls /api/stack
              # - Inspects goroutines stuck in network reads, ffmpeg calls, or stream loops
              #
              # Example output (conceptual):
              # goroutine 1234 [IO wait]:
              # net.(*pollDesc).wait(...)
              #
              # Debug workflow:
              # 1) Call /api/stack
              # 2) Identify repeating goroutines
              # 3) Match stack traces to source code
              # 4) Fix leaks or deadlocks
              #
              # Production advice:
              # - Protect with firewall or disable entirely
              # - Use only during incident response or debugging
